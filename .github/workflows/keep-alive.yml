name: Keep Render alive

on:
  schedule:
    - cron: '*/5 * * * *'   # cada 5 minutos

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Tienda Campesina
        run: |
          curl -s -o /dev/null -w "HTTP status: %{http_code}\n" \
          -H "User-Agent: Mozilla/5.0 (compatible; GitHubActionsBot/1.0)" \
          https://tienda-campesina.onrender.com || true