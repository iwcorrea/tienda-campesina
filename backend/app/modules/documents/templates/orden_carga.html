<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Orden de Carga</title>
<style>body{font-family:Arial;margin:2cm;} h1{color:#2d6a4f;} table{width:100%;border-collapse:collapse;} th,td{border:1px solid #ddd;padding:8px;} th{background:#f2f2f2;}</style>
</head>
<body>
<h1>Orden de Carga</h1>
<p><strong>N° Orden:</strong> {{ numero }}</p>
<p><strong>Fecha:</strong> {{ fecha }}</p>
<p><strong>Transportista:</strong> {{ transportista }}</p>
<p><strong>Vehículo:</strong> {{ vehiculo }}</p>
<p><strong>Ruta:</strong> {{ ruta }}</p>
<table>
<tr><th>Producto</th><th>Cantidad</th></tr>
{% for item in items %}
<tr><td>{{ item.nombre }}</td><td>{{ item.cantidad }}</td></tr>
{% endfor %}
</table>
</body>
</html>
