<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Factura {{ numero }}</title>
<style>body{font-family:Arial;margin:2cm;} h1{color:#2d6a4f;} table{width:100%;border-collapse:collapse;} th,td{border:1px solid #ddd;padding:8px;} th{background:#f2f2f2;}</style>
</head>
<body>
<h1>Factura de Venta</h1>
<p><strong>N° Factura:</strong> {{ numero }}</p>
<p><strong>Fecha:</strong> {{ fecha }}</p>
<p><strong>Vendedor:</strong> {{ vendedor }}</p>
<p><strong>Comprador:</strong> {{ comprador }}</p>
<h3>Detalle</h3>
<table>
<tr><th>Producto</th><th>Cant.</th><th>P. Unit.</th><th>Subtotal</th></tr>
{% for item in items %}
<tr><td>{{ item.nombre }}</td><td>{{ item.cantidad }}</td><td>${{ item.precio_unit }}</td><td>${{ item.subtotal }}</td></tr>
{% endfor %}
<tr><td colspan="3"><strong>Total</strong></td><td><strong>${{ total }}</strong></td></tr>
</table>
</body>
</html>
