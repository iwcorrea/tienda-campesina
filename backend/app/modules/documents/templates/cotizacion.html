<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Cotización</title>
<style>body{font-family:Arial;margin:2cm;} h1{color:#2d6a4f;} table{width:100%;border-collapse:collapse;} th,td{border:1px solid #ddd;padding:8px;} th{background:#f2f2f2;}</style>
</head>
<body>
<h1>Cotización</h1>
<p><strong>Fecha:</strong> {{ fecha }}</p>
<p><strong>Cliente:</strong> {{ cliente }}</p>
<p><strong>Producto/Servicio:</strong> {{ producto }}</p>
<p><strong>Cantidad:</strong> {{ cantidad }}</p>

<p><strong>Condiciones:</strong> {{ condiciones }}</p>
</body>
</html>
