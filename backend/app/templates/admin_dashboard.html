{% extends "base.html" %}
{% block contenido %}
<h1>Panel de administración</h1>
<div class="row">
    <div class="col-md-3"><div class="card p-3">Asociaciones: {{ total_asociaciones }}</div></div>
    <div class="col-md-3"><div class="card p-3">Productos: {{ total_productos }}</div></div>
    <div class="col-md-3"><div class="card p-3">Personas: {{ total_personas }}</div></div>
    <div class="col-md-3"><div class="card p-3">Vacantes: {{ total_vacantes }}</div></div>
</div>
<div class="mt-4">
    <canvas id="registrosChart"></canvas>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const ctx = document.getElementById('registrosChart').getContext('2d');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: {{ labels_mes | tojson }},
            datasets: [{
                label: 'Registros mensuales',
                data: {{ data_mensual | tojson }},
                borderColor: '#2d6a4f'
            }]
        }
    });
</script>
{% endblock %}
