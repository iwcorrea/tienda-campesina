{% extends "base.html" %}

{% block title %}Editar Perfil{% endblock %}

{% block content %}
<h2>Editar perfil de la asociación</h2>

<form action="/panel/editar-perfil" method="post" enctype="multipart/form-data">
    <div class="mb-3">
        <label class="form-label">Nombre de la asociación</label>
        <input type="text" name="nombre_asociacion" class="form-control" value="{{ perfil.nombre }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Descripción</label>
        <textarea name="descripcion" class="form-control" rows="3">{{ perfil.descripcion }}</textarea>
    </div>
    <div class="mb-3">
        <label class="form-label">Dirección / Municipio</label>
        <input type="text" name="direccion" class="form-control" value="{{ perfil.direccion }}">
    </div>
    <div class="mb-3">
        <label class="form-label">Teléfono</label>
        <input type="text" name="telefono" class="form-control" value="{{ perfil.telefono }}">
    </div>
    <div class="mb-3 form-check">
        <input type="checkbox" name="show_whatsapp" value="1" class="form-check-input" id="showWhatsapp" {% if perfil.show_whatsapp == '1' %}checked{% endif %}>
        <label class="form-check-label" for="showWhatsapp">Recibir consultas por WhatsApp</label>
    </div>
    <div class="mb-3">
        <label class="form-label">Logo actual</label><br>
        {% if perfil.logo_url %}
        <img src="{{ perfil.logo_url }}" class="mb-2 rounded" style="max-width: 120px;"><br>
        {% endif %}
        <label class="form-label">Cambiar logo (opcional)</label>
        <input type="file" name="logo" class="form-control" accept="image/*">
    </div>
    <button type="submit" class="btn btn-success">Guardar cambios</button>
    <a href="/panel" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
