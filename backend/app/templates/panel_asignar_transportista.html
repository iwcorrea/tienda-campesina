{% extends "base.html" %}
{% block title %}Asignar transportista{% endblock %}
{% block content %}
<div class="modern-section">
    <h2>Asignar transportista al pedido #{{ pedido.id[:8] }}</h2>
    <form method="post" class="mt-4">
        <div class="mb-3">
            <label for="transportista_id" class="form-label">Elige un transportista</label>
            <select class="form-select rounded-pill" name="transportista_id" required>
                <option value="">Seleccionar...</option>
                {% for t in transportistas %}
                <option value="{{ t.id }}">{{ t.nombre }} - {{ t.tipo_vehiculo }} ({{ t.zona_cobertura }}) - Base ${{ t.tarifa_base }}, ${{ t.costo_km }}/km</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label for="costo_envio" class="form-label">Costo de envío (COP)</label>
            <input type="number" class="form-control rounded-pill" name="costo_envio" id="costo_envio" value="0" min="0" step="1000" required>
            <small class="text-muted">Define el valor del flete que cobrará el transportista. Se sumará al total del pedido.</small>
        </div>
        <button type="submit" class="btn btn-success rounded-pill">Asignar</button>
        <a href="/panel/cotizaciones" class="btn btn-secondary rounded-pill">Cancelar</a>
    </form>
</div>
{% endblock %}
