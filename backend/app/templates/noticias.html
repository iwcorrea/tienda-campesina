{% extends "base.html" %}
{% block contenido %}
<h1 class="mb-4">📰 Noticias</h1>
{% if noticias %}
<div class="row">
    {% for noticia in noticias %}
    <div class="col-md-4 mb-3">
        <div class="card h-100">
            {% if noticia.imagen_url %}
            <img src="{{ noticia.imagen_url }}" loading="lazy" class="card-img-top" alt="{{ noticia.titulo }}">
            {% endif %}
            <div class="card-body">
                <h5 class="card-title">{{ noticia.titulo }}</h5>
                <p class="card-text">{{ noticia.contenido[:150] }}...</p>
                <a href="/noticias/{{ noticia.id }}" class="btn btn-outline-success btn-sm">Leer más</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% else %}
<div class="alert alert-info">No hay noticias publicadas.</div>
{% endif %}
{% endblock %}
