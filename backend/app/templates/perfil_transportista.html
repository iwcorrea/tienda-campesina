{% extends "base.html" %}
{% block title %}Perfil Transportista{% endblock %}
{% block content %}
<div class="modern-section">
    <h2 class="fw-bold mb-4">🚚 Mi Perfil de Transportista</h2>
    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <form action="/perfil-transportista/actualizar" method="post">
                <div class="mb-3"><input type="text" name="nombre" class="form-control" value="{{ transportista.nombre }}" required></div>
                <div class="mb-3"><input type="text" name="telefono" class="form-control" value="{{ transportista.telefono }}"></div>
                <div class="row">
                    <div class="col-md-6">
                        <select name="tipo_vehiculo" class="form-select mb-3">
                            <option value="moto" {% if transportista.tipo_vehiculo == 'moto' %}selected{% endif %}>🏍️ Moto</option>
                            <option value="camioneta" {% if transportista.tipo_vehiculo == 'camioneta' %}selected{% endif %}>🚗 Camioneta</option>
                            <option value="camion" {% if transportista.tipo_vehiculo == 'camion' %}selected{% endif %}>🚛 Camión</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <input type="text" name="capacidad" class="form-control mb-3" value="{{ transportista.capacidad }}">
                    </div>
                </div>
                <div class="mb-3"><input type="text" name="zona_cobertura" class="form-control" value="{{ transportista.zona_cobertura }}"></div>
                <div class="row">
                    <div class="col-md-6"><input type="number" name="tarifa_base" class="form-control mb-3" value="{{ transportista.tarifa_base }}"></div>
                    <div class="col-md-6"><input type="number" name="costo_km" class="form-control mb-3" value="{{ transportista.costo_km }}"></div>
                </div>
                <button type="submit" class="btn btn-success">Guardar cambios</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
