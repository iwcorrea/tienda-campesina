{% extends "base.html" %}
{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h1>{{ noticia.titulo }}</h1>
        {% if noticia.imagen_url %}
        <img src="{{ noticia.imagen_url }}" loading="lazy" class="img-fluid rounded my-3" alt="{{ noticia.titulo }}">
        {% endif %}
        <p class="text-muted">{{ noticia.fecha_publicacion.strftime('%d de %B, %Y') if noticia.fecha_publicacion else '' }}</p>
        <div class="mt-3">
            {{ noticia.contenido | safe }}
        </div>
        <a href="/noticias" class="btn btn-outline-success mt-3">← Volver a noticias</a>
    </div>
</div>
{% endblock %}
