{% extends "base.html" %}
{% block title %}Cambiar contraseña{% endblock %}
{% block content %}
<div class="modern-section">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <h2 class="fw-bold mb-4">🔐 Cambiar contraseña</h2>
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <form method="post" action="/auth/cambiar-password">
                        <div class="mb-3">
                            <label class="form-label">Contraseña actual</label>
                            <input type="password" name="password_actual" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Nueva contraseña</label>
                            <input type="password" name="password_nueva" class="form-control" required minlength="6">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Confirmar nueva contraseña</label>
                            <input type="password" name="password_repite" class="form-control" required minlength="6">
                        </div>
                        {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
                        <button type="submit" class="btn btn-success w-100">Actualizar contraseña</button>
                    </form>
                    <p class="text-center mt-3">
                        {% if request.session.get("tipo_usuario") == "asociacion" %}
                        <a href="/panel">← Volver al panel</a>
                        {% else %}
                        <a href="/perfil">← Volver al perfil</a>
                        {% endif %}
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
