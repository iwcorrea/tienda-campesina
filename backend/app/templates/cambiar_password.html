{% extends "base.html" %}
{% block title %}Cambiar contraseña{% endblock %}
{% block content %}
<div class="modern-section" style="max-width:500px; margin:0 auto;">
    <h2 class="fw-bold mb-4">🔒 Cambiar contraseña</h2>

    {% if error %}
    <div class="alert alert-danger alert-dismissible fade show" role="alert">
        {{ error }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
    </div>
    {% endif %}

    <form method="post" action="/auth/cambiar-password" onsubmit="return validarFormulario()">
        <div class="mb-3">
            <label for="password_actual" class="form-label">Contraseña actual</label>
            <input type="password" class="form-control rounded-pill" id="password_actual" name="password_actual" required>
        </div>
        <div class="mb-3">
            <label for="password_nueva" class="form-label">Nueva contraseña</label>
            <input type="password" class="form-control rounded-pill" id="password_nueva" name="password_nueva" required
                   pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*()_+\-=\[\]{};:'&quot;,.<>/?\\|`~]).{12,}$"
                   title="La contraseña debe tener al menos 12 caracteres, una mayúscula, una minúscula, un número y un símbolo especial.">
            <small class="text-muted">Mínimo 12 caracteres, una mayúscula, una minúscula, un número y un símbolo (ej: ! @ # $ %).</small>
        </div>
        <div class="mb-3">
            <label for="password_confirmacion" class="form-label">Confirmar nueva contraseña</label>
            <input type="password" class="form-control rounded-pill" id="password_confirmacion" name="password_confirmacion" required>
        </div>
        <button type="submit" class="btn btn-success rounded-pill w-100 py-2 fw-bold">Cambiar contraseña</button>
    </form>
</div>

<script>
function validarFormulario() {
    var nueva = document.getElementById('password_nueva').value;
    var confirmacion = document.getElementById('password_confirmacion').value;

    if (nueva.length < 12) {
        alert('La nueva contraseña debe tener al menos 12 caracteres.');
        return false;
    }
    if (!/[A-Z]/.test(nueva)) {
        alert('La nueva contraseña debe incluir al menos una letra mayúscula.');
        return false;
    }
    if (!/[a-z]/.test(nueva)) {
        alert('La nueva contraseña debe incluir al menos una letra minúscula.');
        return false;
    }
    if (!/[0-9]/.test(nueva)) {
        alert('La nueva contraseña debe incluir al menos un número.');
        return false;
    }
    if (!/[!@#$%^&*()_+\-=\[\]{};:'",.<>/?\\|`~]/.test(nueva)) {
        alert('La nueva contraseña debe incluir al menos un símbolo especial (ej: ! @ # $ %).');
        return false;
    }
    if (nueva !== confirmacion) {
        alert('Las contraseñas no coinciden.');
        return false;
    }
    return true;
}
</script>
{% endblock %}
