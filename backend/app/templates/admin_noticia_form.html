{% extends "base.html" %}
{% block title %}{% if noticia %}Editar{% else %}Nueva{% endif %} Noticia{% endblock %}
{% block content %}
<div class="modern-section">
    <h2 class="fw-bold mb-4">📰 {% if noticia %}Editar noticia{% else %}Nueva noticia{% endif %}</h2>
    <div class="card shadow-sm border-0">
        <div class="card-body">
            <form method="post" enctype="multipart/form-data"
                  action="{% if noticia %}/admin/noticias/editar/{{ noticia.id }}{% else %}/admin/noticias/nueva{% endif %}">
                <div class="mb-3">
                    <label class="form-label">Título</label>
                    <input type="text" name="titulo" class="form-control" value="{{ noticia.titulo if noticia else '' }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Contenido</label>
                    <textarea name="contenido" class="form-control" rows="6" required>{{ noticia.contenido if noticia else '' }}</textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Imagen</label>
                    {% if noticia and noticia.imagen_url %}
                    <img src="{{ noticia.imagen_url }}" class="mb-2 rounded" style="max-width:200px"><br>
                    {% endif %}
                    <input type="file" name="imagen" class="form-control" accept="image/*">
                </div>
                <button type="submit" class="btn btn-success">Guardar</button>
                <a href="/admin/noticias" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
