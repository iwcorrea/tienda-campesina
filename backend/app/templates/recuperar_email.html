{% extends "base.html" %}
{% block title %}Recuperar contraseña{% endblock %}
{% block content %}
<div class="modern-section">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <h2 class="fw-bold mb-4">🔑 Recuperar contraseña</h2>
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <form method="post" action="/auth/recuperar">
                        <div class="mb-3">
                            <label class="form-label">Email registrado</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
                        <button type="submit" class="btn btn-success w-100">Continuar</button>
                    </form>
                    <p class="text-center mt-3"><a href="/auth/login">← Volver al login</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
