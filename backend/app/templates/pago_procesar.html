{% extends "base.html" %}
{% block title %}Procesando pago...{% endblock %}
{% block content %}
<div class="modern-section text-center" style="max-width:500px;margin:0 auto;">
    <div class="mt-5 mb-4">
        <div class="spinner-border text-success" role="status" style="width:4rem;height:4rem;">
            <span class="visually-hidden">Procesando...</span>
        </div>
    </div>
    <h3>Procesando tu pago</h3>
    <p class="text-muted">Referencia: <strong>{{ pago.wompi_referencia }}</strong></p>
    <p class="text-muted">Monto: <strong>${{ pago.monto_total | int }} COP</strong></p>

    <form method="post" action="/pagos/confirmar/{{ pago.id }}" class="mt-4">
        <p class="text-muted small mb-3">(Simulación – en producción serías redirigido a Wompi)</p>
        <button type="submit" class="btn btn-success rounded-pill px-5 py-2 fw-bold">
            Confirmar pago (simulado)
        </button>
    </form>
</div>
{% endblock %}
