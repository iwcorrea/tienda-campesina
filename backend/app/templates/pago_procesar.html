{% extends "base.html" %}
{% block contenido %}
<div class="row justify-content-center text-center">
    <div class="col-md-6">
        <h2 class="mb-3">⏳ Procesando pago</h2>
        <p>Estás siendo redirigido a la pasarela de pago...</p>
        <div class="spinner-border text-success" role="status"></div>
        <p class="mt-3">Referencia: {{ pago.wompi_referencia }}</p>
        <a href="/pagos/exito/{{ pago.id }}" class="btn btn-success mt-3">Simular pago exitoso</a>
    </div>
</div>
{% endblock %}
