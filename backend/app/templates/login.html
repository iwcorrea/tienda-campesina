{% extends "base.html" %}
{% block title %}Iniciar sesión{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h3 class="fw-bold mb-3 text-center">🔐 Iniciar sesión</h3>
                {% if mensaje %}<div class="alert alert-success">{{ mensaje }}</div>{% endif %}
                <form action="/auth/login" method="post">
                    <div class="mb-3"><input type="email" name="email" class="form-control" placeholder="Email" required></div>
                    <div class="mb-3"><input type="password" name="password" class="form-control" placeholder="Contraseña" maxlength="72" required></div>
                    <button type="submit" class="btn btn-success w-100">Ingresar</button>
                </form>
                {% if error %}<div class="alert alert-danger mt-3">{{ error }}</div>{% endif %}
                <p class="mt-3 text-center text-muted">
                    <a href="/auth/recuperar">¿Olvidaste tu contraseña?</a><br>
                    ¿No tienes cuenta? <a href="/auth/registro">Registrar asociación</a> o <a href="/auth/registro-persona">Registro persona</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
