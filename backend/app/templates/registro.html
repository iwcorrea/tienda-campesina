{% extends "base.html" %}
{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-6 col-10">
        <h2 class="mb-3">🌱 Registrarme</h2>
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="post" action="/auth/register">
            <div class="mb-3">
                <label for="tipo" class="form-label">Tipo de usuario</label>
                <select class="form-select" id="tipo" name="tipo" required>
                    <option value="">Selecciona...</option>
                    <option value="asociacion">Productor (Asociación)</option>
                    <option value="persona">Comprador</option>
                    <option value="transportista">Transportista</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre</label>
                <input type="text" class="form-control" id="nombre" name="nombre" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Correo electrónico</label>
                <input type="email" class="form-control" id="email" name="email" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <div class="mb-3">
                <label for="telefono" class="form-label">Teléfono</label>
                <input type="text" class="form-control" id="telefono" name="telefono">
            </div>
            <div class="mb-3">
                <label for="region" class="form-label">Región</label>
                <input type="text" class="form-control" id="region" name="region" placeholder="Ej: Cundinamarca">
            </div>
            <button type="submit" class="btn btn-success w-100">Crear cuenta</button>
        </form>
        <p class="mt-3 text-center">¿Ya tienes cuenta? <a href="/auth/login">Iniciar sesión</a></p>
    </div>
</div>
{% endblock %}
