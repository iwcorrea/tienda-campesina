<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tienda Campesina</title>

    <!-- ✅ Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- 🔥 TU CSS PERSONALIZADO -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <!-- 🔥 NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand" href="/">🌾 Tienda Campesina</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/catalogo">Catálogo</a>
                    </li>

                    <!-- 🔥 CORRECCIÓN IMPORTANTE DE RUTAS -->
                    <li class="nav-item">
                        <a class="nav-link" href="/auth/login">Iniciar sesión</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/auth/registro">Registrarse</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 🔥 CONTENIDO DINÁMICO -->
    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>

    <!-- ✅ JS Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
