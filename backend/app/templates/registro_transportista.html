{% extends "base.html" %}
{% block title %}Registro de Transportista{% endblock %}
{% block content %}
<div class="modern-section">
    <h2 class="fw-bold mb-4">🚚 Registro de Transportista</h2>
    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <form action="/auth/registro-transportista" method="post" enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="form-label">Email *</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Contraseña *</label>
                    <input type="password" name="password" class="form-control" minlength="8" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Nombre completo *</label>
                    <input type="text" name="nombre" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Teléfono</label>
                    <input type="text" name="telefono" class="form-control" placeholder="Opcional">
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <label class="form-label">Tipo de vehículo *</label>
                        <select name="tipo_vehiculo" class="form-select mb-3">
                            <option value="moto">🏍️ Moto</option>
                            <option value="camioneta" selected>🚗 Camioneta</option>
                            <option value="camion">🚛 Camión</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Capacidad de carga *</label>
                        <input type="text" name="capacidad" class="form-control mb-3" value="500 kg" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Zona de cobertura *</label>
                    <input type="text" name="zona_cobertura" class="form-control" placeholder="Ej: Tierralta – Montería" required>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <label class="form-label">Tarifa base (COP) *</label>
                        <input type="number" name="tarifa_base" class="form-control mb-3" value="5000" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Costo por kilómetro (COP) *</label>
                        <input type="number" name="costo_km" class="form-control mb-3" value="1500" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Documento (licencia/SOAT) – opcional</label>
                    <input type="file" name="documento" class="form-control" accept=".pdf,.jpg,.png">
                </div>
                <button type="submit" class="btn btn-success w-100">Registrarse como transportista</button>
            </form>
            {% if error %}<div class="alert alert-danger mt-3">{{ error }}</div>{% endif %}
        </div>
    </div>
</div>
{% endblock %}
