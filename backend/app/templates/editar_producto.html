{% extends "base.html" %}

{% block title %}Editar producto | Tienda Campesina{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-8">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <h2 class="h4 mb-3">Editar producto</h2>
                {% if producto %}
                    <form method="post" action="/productos/editar/{{ producto.id }}" enctype="multipart/form-data" class="row g-3">
                        <div class="col-12">
                            <label class="form-label">Nombre</label>
                            <input type="text" name="nombre" class="form-control" value="{{ producto.nombre }}" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Descripcion</label>
                            <textarea name="descripcion" class="form-control" rows="3">{{ producto.descripcion or "" }}</textarea>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Precio (centavos, opcional)</label>
                            <input type="number" min="0" name="precio" class="form-control" value="{{ producto.precio if producto.precio is not none else '' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Disponible</label>
                            <select name="disponible" class="form-select">
                                <option value="1" {% if producto.disponible == 1 %}selected{% endif %}>Si</option>
                                <option value="0" {% if producto.disponible == 0 %}selected{% endif %}>No</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Cambiar imagen (opcional)</label>
                            <input type="file" name="imagen" class="form-control" accept="image/*">
                        </div>
                        <div class="col-12 d-flex gap-2">
                            <button class="btn btn-success" type="submit">Actualizar</button>
                            <a href="/productos" class="btn btn-outline-secondary">Cancelar</a>
                        </div>
                    </form>
                {% else %}
                    <div class="alert alert-warning mb-0">Producto no encontrado.</div>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
