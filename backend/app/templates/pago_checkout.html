{% extends "base.html" %}
{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-3">💳 Confirmar pago</h2>
        <div class="card">
            <div class="card-body">
                <h5>Pedido #{{ pedido.id[:8] }}</h5>
                <p>Total a pagar: <strong>${{ "{:,.0f}".format(total) }}</strong></p>
                <p>Comisión plataforma: ${{ "{:,.0f}".format(comision_plataforma) }}</p>
                <p>Costo de envío: ${{ "{:,.0f}".format(costo_envio) }}</p>
                <form method="post" action="/pagos/iniciar/{{ pedido.id }}">
                    <button type="submit" class="btn btn-success w-100">Ir a pagar</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
